name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '24.18.0'
          cache: npm

      - name: Install dependencies
        run: npm ci
      - name: Run lint
        run: npm run lint

      - name: Run submission directory tests
        run: npm run test:submission-directory
      - name: Build application
        run: npm run build
